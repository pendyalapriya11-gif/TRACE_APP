<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TRACE - Create Account</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
body { min-height: 100vh; background: rgb(52, 51, 51); display: flex; justify-content: center; align-items: center; padding: 20px; }
.register-container {
    background: #fdfaf4; width: 100%; max-width: 500px; padding: 45px 35px;
    border-radius: 20px; border: 2px solid #2a2a2a;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25); text-align: center;
}
.logo {
    width: 100px; height: 100px; margin: 0 auto 20px;
    border-radius: 50%; overflow: hidden; border: 3px solid #2a2a2a;
    background: #fff; display: flex; align-items: center;
    justify-content: center; font-size: 40px; font-weight: 700; color: #2a2a2a;
}
h1 { font-size: 28px; font-weight: 700; letter-spacing: 3px; color: #2a2a2a; margin-bottom: 5px; }
.subtitle { font-size: 13px; color: #444; margin-bottom: 25px; }
.input-group { margin-bottom: 18px; text-align: left; }
.input-group label { font-size: 13px; font-weight: 600; color: #2a2a2a; margin-bottom: 5px; display: block; }
.input-group input {
    width: 100%; padding: 11px 12px; border-radius: 8px;
    border: 2px solid #2a2a2a; background: #fdfaf4; outline: none;
    font-size: 16px; /* prevents iOS zoom */
}
.register-btn {
    width: 100%; padding: 14px; background: #2a2a2a; color: #fdfaf4;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; margin-top: 10px;
}
.register-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.extra-links { margin-top: 15px; font-size: 13px; color: #444; line-height: 2; }
.extra-links a { color: #2a2a2a; text-decoration: none; font-weight: 600; cursor: pointer; }
.alert { padding: 10px; margin-bottom: 15px; border-radius: 8px; font-size: 13px; display: none; }
.alert.show { display: block; }
.alert-error { background: #ffe6e6; color: #d8000c; border: 1px solid #d8000c; }
.alert-success { background: #e6ffe6; color: #0c8000; border: 1px solid #0c8000; }
.password-hint { font-size: 11px; color: #666; margin-top: 3px; }

@media (max-width: 480px) {
    .register-container { padding: 30px 20px; border-radius: 16px; }
    h1 { font-size: 24px; }
    .logo { width: 80px; height: 80px; font-size: 32px; }
}
</style>
</head>
<body>
<div class="register-container">
    <div class="logo">
        <img src="logo.png" alt="TRACE Logo" style="width:100%;height:100%;object-fit:cover;">
    </div>
    <h1>TRACE</h1>
    <p class="subtitle">Create Your Account</p>
    
    <div id="alert" class="alert"></div>
    
    <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="John Doe" required>
        </div>
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required minlength="6">
            <p class="password-hint">Must be at least 6 characters</p>
        </div>
        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="••••••••" required minlength="6">
        </div>
        <button type="submit" class="register-btn" id="registerBtn">Create Account</button>
    </form>
    
    <div class="extra-links">
        <p>Already have an account? <a href="index.html">Sign In</a></p>
    </div>
</div>

<script>
const API_URL = 'http://localhost:5000/api';

function showAlert(message, type) {
    const alert = document.getElementById('alert');
    alert.textContent = message;
    alert.className = `alert alert-${type} show`;
    setTimeout(() => alert.classList.remove('show'), 5000);
}

async function handleRegister(event) {
    event.preventDefault();
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const registerBtn = document.getElementById('registerBtn');
    if (password !== confirmPassword) { showAlert('Passwords do not match!', 'error'); return; }
    if (password.length < 6) { showAlert('Password must be at least 6 characters!', 'error'); return; }
    registerBtn.disabled = true; registerBtn.textContent = 'Creating account...';
    try {
        const response = await fetch(`${API_URL}/auth/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password })
        });
        const data = await response.json();
        if (data.success) {
            showAlert('Account created successfully! Redirecting to login...', 'success');
            setTimeout(() => { window.location.href = 'index.html'; }, 2000);
        } else { showAlert(data.message || 'Registration failed', 'error'); }
    } catch (error) { showAlert('Cannot connect to server. Is it running?', 'error'); }
    finally { registerBtn.disabled = false; registerBtn.textContent = 'Create Account'; }
}
</script>
</body>
</html>
