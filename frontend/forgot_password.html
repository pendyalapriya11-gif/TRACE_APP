<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TRACE - Forgot Password</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
body { min-height: 100vh; background: rgb(52, 51, 51); display: flex; justify-content: center; align-items: center; padding: 20px; }
.forgot-container {
    background: #fdfaf4; width: 100%; max-width: 500px; padding: 45px 35px;
    border-radius: 20px; border: 2px solid #2a2a2a;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25); text-align: center;
}
.logo {
    width: 100px; height: 100px; margin: 0 auto 20px;
    border-radius: 50%; overflow: hidden; border: 3px solid #2a2a2a;
    background: #fff; display: flex; align-items: center;
    justify-content: center; font-size: 40px; font-weight: 700; color: #2a2a2a;
}
h1 { font-size: 28px; font-weight: 700; letter-spacing: 3px; color: #2a2a2a; margin-bottom: 5px; }
.subtitle { font-size: 13px; color: #444; margin-bottom: 25px; }
.input-group { margin-bottom: 18px; text-align: left; }
.input-group label { font-size: 13px; font-weight: 600; color: #2a2a2a; margin-bottom: 5px; display: block; }
.input-group input {
    width: 100%; padding: 11px 12px; border-radius: 8px;
    border: 2px solid #2a2a2a; background: #fdfaf4; outline: none;
    font-size: 16px;
}
.submit-btn {
    width: 100%; padding: 14px; background: #2a2a2a; color: #fdfaf4;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer;
}
.submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.extra-links { margin-top: 15px; font-size: 13px; color: #444; line-height: 2; }
.extra-links a { color: #2a2a2a; text-decoration: none; font-weight: 600; }
.alert { padding: 10px; margin-bottom: 15px; border-radius: 8px; font-size: 13px; display: none; }
.alert.show { display: block; }
.alert-error { background: #ffe6e6; color: #d8000c; border: 1px solid #d8000c; }
.alert-success { background: #e6ffe6; color: #0c8000; border: 1px solid #0c8000; }
.alert-info { background: #e6f3ff; color: #004085; border: 1px solid #004085; }

@media (max-width: 480px) {
    .forgot-container { padding: 30px 20px; border-radius: 16px; }
    h1 { font-size: 24px; }
    .logo { width: 80px; height: 80px; font-size: 32px; }
}
</style>
</head>
<body>

<div class="forgot-container">
     <img src="logo.png" alt="TRACE Logo" class="logo">
    <h1>TRACE</h1>
    <p class="subtitle">Reset Your Password</p>
    
    <div id="alert" class="alert"></div>
    
    <p style="font-size:13px;color:#444;margin-bottom:20px;">
        Enter your email address and we'll send you a link to reset your password.
    </p>
    
    <form id="emailForm" onsubmit="requestReset(event)">
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <button type="submit" class="submit-btn" id="emailBtn">Send Reset Link</button>
    </form>
    
    <div class="extra-links">
        <p><a href="index.html">Back to Login</a></p>
    </div>
</div>

<script>
const API_URL = 'http://localhost:5000/api';

function showAlert(message, type) {
    const alert = document.getElementById('alert');
    alert.textContent = message;
    alert.className = `alert alert-${type} show`;
}

async function requestReset(event) {
    event.preventDefault();
    const email = document.getElementById('email').value;
    const emailBtn = document.getElementById('emailBtn');
    emailBtn.disabled = true; emailBtn.textContent = 'Sending email...';
    try {
        const response = await fetch(`${API_URL}/auth/forgot-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        const data = await response.json();
        if (data.success) {
            showAlert('✅ Password reset email sent! Check your inbox.', 'success');
            document.getElementById('emailForm').style.display = 'none';
        } else { showAlert(data.message || 'Failed to send reset email', 'error'); }
    } catch (error) { showAlert('Cannot connect to server. Is it running?', 'error'); }
    finally { emailBtn.disabled = false; emailBtn.textContent = 'Send Reset Link'; }
}
</script>

</body>
</html>
