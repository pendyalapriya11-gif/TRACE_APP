<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TRACE Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
body { min-height: 100vh; background: rgb(52, 51, 51); display: flex; justify-content: center; align-items: center; padding: 20px; }
.login-container {
    background: #fdfaf4; width: 100%; max-width: 500px; padding: 45px 35px;
    border-radius: 20px; border: 2px solid #2a2a2a;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25); text-align: center;
}
.logo {
    width: 100px; height: 100px; margin: 0 auto 20px;
    border-radius: 50%; overflow: hidden; border: 3px solid #2a2a2a;
    background: #fff; display: flex; align-items: center;
    justify-content: center; font-size: 40px; font-weight: 700; color: #2a2a2a;
}
h1 { font-size: 28px; font-weight: 700; letter-spacing: 3px; color: #2a2a2a; margin-bottom: 5px; }
.subtitle { font-size: 13px; color: #444; margin-bottom: 25px; }
.input-group { margin-bottom: 18px; text-align: left; }
.input-group label { font-size: 13px; font-weight: 600; color: #2a2a2a; margin-bottom: 5px; display: block; }
.input-group input {
    width: 100%; padding: 11px 12px; border-radius: 8px;
    border: 2px solid #2a2a2a; background: #fdfaf4; outline: none;
    font-size: 16px; /* prevents iOS zoom */
}
.login-btn {
    width: 100%; padding: 14px; background: #2a2a2a; color: #fdfaf4;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer;
}
.login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.extra-links { margin-top: 15px; font-size: 13px; color: #444; line-height: 2; }
.extra-links a { color: #2a2a2a; text-decoration: none; font-weight: 600; cursor: pointer; }
.alert { padding: 10px; margin-bottom: 15px; border-radius: 8px; font-size: 13px; display: none; }
.alert.show { display: block; }
.alert-error { background: #ffe6e6; color: #d8000c; border: 1px solid #d8000c; }
.alert-success { background: #e6ffe6; color: #0c8000; border: 1px solid #0c8000; }

@media (max-width: 480px) {
    .login-container { padding: 30px 20px; border-radius: 16px; }
    h1 { font-size: 24px; }
    .logo { width: 80px; height: 80px; font-size: 32px; }
}
</style>
</head>
<body>
<div class="login-container">
    <div class="logo">
        <img src="logo.png" alt="TRACE Logo" style="width:100%;height:100%;object-fit:cover;">
    </div>
    <h1>TRACE</h1>
    <p class="subtitle">Tracking &amp; Reflective Academic Coding Engine</p>
    
    <div id="alert" class="alert"></div>
    
    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
    </form>
    
    <div class="extra-links">
        <p><a href="forgot_password.html">Forgot password?</a></p>
        <p>New here? <a href="register.html">Create account</a></p>
    </div>
</div>

<script>
const API_URL = 'https://trace-app-8t3b.onrender.com/api';

function showAlert(message, type) {
    const alert = document.getElementById('alert');
    alert.textContent = message;
    alert.className = `alert alert-${type} show`;
    setTimeout(() => alert.classList.remove('show'), 5000);
}

async function handleLogin(event) {
    event.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const loginBtn = document.getElementById('loginBtn');
    loginBtn.disabled = true; loginBtn.textContent = 'Signing in...';
    try {
        const response = await fetch(`${API_URL}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await response.json();
        if (data.success) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            showAlert('Login successful!', 'success');
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
        } else { showAlert(data.message || 'Login failed', 'error'); }
    } catch (error) { showAlert('Cannot connect to server. Is it running?', 'error'); }
    finally { loginBtn.disabled = false; loginBtn.textContent = 'Sign In'; }
}
</script>
</body>
</html>
