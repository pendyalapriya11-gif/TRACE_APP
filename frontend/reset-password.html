<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRACE - Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

body {
    height: 100vh; background: rgb(52, 51, 51);
    display: flex; justify-content: center; align-items: center;
}

.reset-container {
    background: #fdfaf4; width: 500px; padding: 45px 35px;
    border-radius: 20px; border: 2px solid #2a2a2a;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25); text-align: center;
}

.logo {
    width: 100px; height: 100px; margin: 0 auto 20px;
    border-radius: 50%; overflow: hidden; border: 3px solid #2a2a2a;
    background: #fff; display: flex; align-items: center;
    justify-content: center; font-size: 40px; font-weight: 700;
    color: #2a2a2a;
}

h1 {
    font-size: 28px; font-weight: 700; letter-spacing: 3px;
    color: #2a2a2a; margin-bottom: 5px;
}

.subtitle {
    font-size: 13px; color: #444; margin-bottom: 25px;
}

.input-group {
    margin-bottom: 18px; text-align: left;
}

.input-group label {
    font-size: 13px; font-weight: 600; color: #2a2a2a;
    margin-bottom: 5px; display: block;
}

.input-group input {
    width: 100%; padding: 11px 12px; border-radius: 8px;
    border: 2px solid #2a2a2a; background: #fdfaf4; outline: none;
}

.reset-btn {
    width: 100%; padding: 12px; background: #2a2a2a;
    color: #fdfaf4; border: none; border-radius: 8px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    margin-top: 10px;
}

.reset-btn:disabled {
    opacity: 0.6; cursor: not-allowed;
}

.extra-links {
    margin-top: 15px; font-size: 13px; color: #444;
}

.extra-links a {
    color: #2a2a2a; text-decoration: none; font-weight: 600;
}

.alert {
    padding: 10px; margin-bottom: 15px; border-radius: 8px;
    font-size: 13px; display: none;
}

.alert.show { display: block; }

.alert-error {
    background: #ffe6e6; color: #d8000c; border: 1px solid #d8000c;
}

.alert-success {
    background: #e6ffe6; color: #0c8000; border: 1px solid #0c8000;
}
</style>
</head>
<body>

<div class="reset-container">
    <div class="logo">TR</div>
    
    <h1>TRACE</h1>
    <p class="subtitle">Create Your New Password</p>
    
    <div id="alert" class="alert"></div>
    
    <form id="resetForm" onsubmit="handleReset(event)">
        <div class="input-group">
            <label>New Password</label>
            <input type="password" id="newPassword" placeholder="••••••••" required minlength="6">
        </div>
        
        <div class="input-group">
            <label>Confirm New Password</label>
            <input type="password" id="confirmPassword" placeholder="••••••••" required minlength="6">
        </div>
        
        <button type="submit" class="reset-btn" id="resetBtn">Reset Password</button>
    </form>
    
    <div class="extra-links">
        <p><a href="index.html">Back to Login</a></p>
    </div>
</div>

<script>
const API_URL = 'http://localhost:5000/api';

function showAlert(message, type) {
    const alert = document.getElementById('alert');
    alert.textContent = message;
    alert.className = `alert alert-${type} show`;
    setTimeout(() => alert.classList.remove('show'), 5000);
}

// Get token from URL
function getTokenFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get('token');
}

async function handleReset(event) {
    event.preventDefault();
    
    const token = getTokenFromUrl();
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const resetBtn = document.getElementById('resetBtn');
    
    if (!token) {
        showAlert('Invalid reset link. Please request a new password reset.', 'error');
        return;
    }
    
    if (newPassword !== confirmPassword) {
        showAlert('Passwords do not match!', 'error');
        return;
    }
    
    if (newPassword.length < 6) {
        showAlert('Password must be at least 6 characters!', 'error');
        return;
    }
    
    resetBtn.disabled = true;
    resetBtn.textContent = 'Resetting password...';
    
    try {
        const response = await fetch(`${API_URL}/auth/reset-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, newPassword })
        });
        
        const data = await response.json();
        
        if (data.success) {
            showAlert('Password reset successful! Redirecting to login...', 'success');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2000);
        } else {
            showAlert(data.message || 'Password reset failed', 'error');
        }
    } catch (error) {
        showAlert('Cannot connect to server. Is it running?', 'error');
    } finally {
        resetBtn.disabled = false;
        resetBtn.textContent = 'Reset Password';
    }
}

// Check if token exists
window.onload = () => {
    const token = getTokenFromUrl();
    if (!token) {
        showAlert('Invalid or missing reset token. Please request a new password reset.', 'error');
        document.getElementById('resetForm').style.display = 'none';
    }
};
</script>

</body>
</html>
